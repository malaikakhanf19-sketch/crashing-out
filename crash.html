<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are We Crashing Out?</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: #000; color: #fff;
            scroll-behavior: smooth;
        }
        .landing {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(45deg, #000 0%, #1a0000 100%);
        }
        h1 { font-size: clamp(2rem, 8vw, 4rem); color: #ff0000; text-transform: uppercase; }
        .btn-container { display: flex; gap: 20px; margin-top: 20px; }
        .btn {
            padding: 15px 45px; font-size: 1.2rem; cursor: pointer;
            border: 3px solid #fff; background: none; color: #fff;
            transition: 0.2s; font-weight: 900;
        }
        .btn-no:hover { background: #ff0000; border-color: #ff0000; transform: scale(1.1); }
        .btn-yes:hover { background: #fff; color: #000; transform: scale(1.1); }
        
        .store { min-height: 100vh; padding: 80px 20px; background: #080808; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; max-width: 1100px; margin: 40px auto;
        }
        .card {
            background: #111; padding: 40px; border: 2px solid #222;
            text-align: center; transition: 0.3s;
        }
        .card:hover { border-color: #ff0000; background: #1a0000; }
        h3 { color: #ff0000; font-size: 1.5rem; }
    </style>
</head>
<body>

    <section class="landing">
        <h1>Are we crashing out?</h1>
        <div class="btn-container">
            <button class="btn btn-yes" onclick="document.getElementById('store-top').scrollIntoView()">YES</button>
            <button class="btn btn-no" onclick="location.href='https://www.youtube.com/watch?v=8Go6dHuylyM'">NO</button>
        </div>
    </section>

    <div id="store-top"></div>
    <section class="store">
        <h2 style="text-align:center; font-size: 3rem; letter-spacing: -2px;">THE CRASH OUT SHOP</h2>
        <div class="grid">
            <div class="card">
                <h3>THE "I'M DONE" HOODIE</h3>
                <p>Oversized. Heavyweight. Regret-free.</p>
                <p><strong>$65.00</strong></p>
            </div>
            <div class="card">
                <h3>CRASH OUT ENERGY DRINK</h3>
                <p>300mg of pure chaos in a can.</p>
                <p><strong>$4.99</strong></p>
            </div>
            <div class="card">
                <h3>REPLACEMENT TV SCREEN</h3>
                <p>For when the game didn't go your way.</p>
                <p><strong>$299.00</strong></p>
            </div>
        </div>
    </section>

</body>
</html>
